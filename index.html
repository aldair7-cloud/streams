<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vimeo Player</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: black;
    overflow: hidden;
}
.video-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}
iframe {
    width: 100%;
    height: 100%;
    border: 0;
}
</style>
</head>

<body>

<div class="video-container">
    <iframe
    src="https://www.youtube.com/embed/TPzYDxFlDPs?autoplay=1&mute=1&loop=1&playlist=TPzYDxFlDPs&controls=0&modestbranding=1&playsinline=1"
    allow="autoplay; fullscreen; picture-in-picture"
    allowfullscreen>
</iframe>
</div>

</body>
</html>
